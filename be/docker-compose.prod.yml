services:
  app:
    image: ghcr.io/jeonggyunko/finswipe_be_springboot:latest
    container_name: finswipe-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-files: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
