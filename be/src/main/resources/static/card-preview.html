const CARDS = [
  {

    ticker: 'NVDA',

// ── 스파크라인 SVG 경로 생성 ──
function buildSparkline(data, w, h, id, strokeColor, fillColor) {
  const pad = 4;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const xs = (w - pad * 2) / (data.length - 1);
  const pts = data.map((v, i) => ({
    x: pad + i * xs,
    y: pad + (1 - (v - min) / range) * (h - pad * 2)
  }));
  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1].x.toFixed(1)} ${h} L${pts[0].x.toFixed(1)} ${h} Z`;
  return `
    <defs>
      <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${fillColor}" stop-opacity="0.22"/>
        <stop offset="1" stop-color="${fillColor}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaPath}" fill="url(#${id})"/>
    <path d="${linePath}" stroke="${strokeColor}" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  `;
}

// ── 지표 표시값 ──
function indicatorDisplay(ind) {
  if (ind.value !== null && ind.value !== undefined) {
    if (ind.type === '거래량') return '+' + Math.round((ind.value - 1) * 100) + '%';
    return ind.value;
  }
  return ind.displayText || '—';
}

// ── 지표 CSS 클래스 ──
function indicatorClass(ind) {
  const label = ind.label || '';
  if (['과열','상단 돌파','상단 밴드'].includes(label)) return 'warn';
  if (['과매도','데드크로스','하락추세','하단 이탈','하단 밴드','급감'].includes(label)) return 'neg';
  if (['골든크로스','상승추세','급등','증가'].includes(label)) return 'good';
  return '';
}

// ── API 기사 → 카드 데이터 변환 ──
function articleToCard(a, ticker) {
  const chg = a.changePct1d;
  const themeMap = { positive:'bull', negative:'bear', neutral:'neutral', mixed:'mixed' };
  const theme = themeMap[a.sentimentLabel] || 'neutral';

  const volInd = (a.indicators || []).find(i => i.type === '거래량');
  const volRatio = volInd?.value;
  let highlight;
  if (volRatio && volRatio >= 2) {
    const pct = Math.round((volRatio - 1) * 100);
    highlight = { tag: '🔥 거래량 급등', bigNum: `+${pct}%`, sub: `평소의 ${volRatio.toFixed(1)}배 — 지금 뭔가 일어나고 있어요` };
  } else if (chg != null) {
    const sign = chg >= 0 ? '+' : '';
    highlight = { tag: chg >= 0 ? '📈 상승' : '📉 급락', bigNum: `${sign}${chg.toFixed(1)}%`, sub: `전일 종가 대비 ${Math.abs(chg).toFixed(1)}% ${chg >= 0 ? '상승' : '하락'}` };
  } else {
    highlight = { tag: '📰 뉴스', bigNum: '—', sub: '' };
  }

  const now = a.publishedAt ? new Date(a.publishedAt).toLocaleString('ko') : '';
  const sentMap = { positive: ['📈', '긍정 신호'], negative: ['📉', '부정 신호'], neutral: ['📊', '중립'], mixed: ['🔀', '혼재'] };
  const [sentEmoji, sentText] = sentMap[a.sentimentLabel] || ['📊', '—'];

  return {
    theme, sentimentLabel: a.sentimentLabel,
    setLabel: `${ticker} · 실시간 API 데이터`,
    ticker, company: ticker,
    currentPrice: a.currentPrice, changePct1d: chg,
    sparkline: a.sparkline || [],
    highlight,
    indicators: a.indicators || [],
    summary3linesKo: a.summary3linesKo || [],
    sentimentScore: a.sentimentScore,
    sentimentEmoji: sentEmoji, sentimentText: sentText,
    sentimentReason: a.sentimentReason || '',
    headlineKo: a.headlineKo || a.headline || '',
    publishedRelative: now,
    eventPill: a.eventCategory ? `📋 ${a.eventCategory}` : '📰 뉴스',
    sources: (a.tickers || []).join(' · '),
  };
}

// ── 초기화 ──
async function init() {
  const ticker = new URLSearchParams(location.search).get('ticker');
  if (ticker) {
    const root = document.getElementById('root');
    root.innerHTML =
      `<div style="padding:80px;text-align:center;color:#64748b;font-size:14px;">📡 ${ticker} 데이터 로딩 중...</div>`;
    try {
      const adminKey = new URLSearchParams(location.search).get('adminKey') || '';
      const r = await fetch(`/news/latest?ticker=${encodeURIComponent(ticker)}&limit=3`,
        adminKey ? { headers: { 'X-Admin-Key': adminKey } } : {});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      const articles = d.data || [];
      if (!articles.length) {
        // 기사 없으면 데모 카드에 배너만 붙여 표시
        root.innerHTML =
          `<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:12px 20px;margin-bottom:20px;font-size:13px;color:#856404;font-weight:600;">⚠️ <b>${ticker}</b> 분석 기사가 아직 없습니다 — 데모 카드 표시 중</div>`;
        renderCards(CARDS);
        return;
      }
      renderCards(articles.map(a => articleToCard(a, ticker.toUpperCase())));
    } catch(e) {
      root.innerHTML =
        `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:16px 20px;margin-bottom:16px;font-size:13px;color:#dc2626;font-weight:600;">❌ 오류: ${e.message}</div>`;
      renderCards(CARDS);
    }
  } else {
    renderCards(CARDS);
  }
}

init();
