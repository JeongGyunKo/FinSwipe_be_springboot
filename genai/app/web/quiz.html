<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinSwipe 투자 진단</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0f1923; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8eaf0; padding: 20px; }
    .card { background: #1a2535; border-radius: 20px; padding: 40px; width: 100%; max-width: 660px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

    /* 진행 바 */
    .progress-bar-wrap { background: #243044; border-radius: 99px; height: 6px; margin-bottom: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .knowledge-bar { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
    .preference-bar { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    .deep-bar { background: linear-gradient(90deg, #10b981, #3b82f6); }
    .progress-label { text-align: right; font-size: 13px; color: #6b7fa3; margin-bottom: 24px; }

    .phase-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .phase-label.knowledge { color: #3b82f6; }
    .phase-label.preference { color: #f59e0b; }
    .phase-label.deep { color: #10b981; }
    .area-badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-bottom: 16px; }
    .area-badge.knowledge { background: #1e3a5f; color: #60a5fa; }
    .area-badge.preference { background: #3d2a00; color: #fbbf24; }
    .area-badge.deep { background: #0d2e22; color: #34d399; }

    .question-text { font-size: 17px; line-height: 1.7; color: #d1d9ef; margin-bottom: 24px; min-height: 60px; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn { background: #243044; border: 2px solid #2d3f5c; border-radius: 12px; padding: 13px 16px; color: #c8d0e8; font-size: 14px; text-align: left; cursor: pointer; transition: all 0.15s; display: flex; gap: 10px; align-items: flex-start; }
    .choice-btn:hover:not(:disabled) { border-color: #3b82f6; background: #1e3a5f; }
    .choice-btn .key { font-weight: 700; min-width: 18px; color: #3b82f6; }
    .choice-btn.correct { border-color: #22c55e; background: #14321f; color: #86efac; }
    .choice-btn.correct .key { color: #22c55e; }
    .choice-btn.wrong { border-color: #ef4444; background: #3b1212; color: #fca5a5; }
    .choice-btn.wrong .key { color: #ef4444; }
    .choice-btn.selected-pref { border-color: #f59e0b; background: #2d1f00; color: #fde68a; }
    .choice-btn.e-btn { border-style: dashed; color: #6b7fa3; }
    .choice-btn.e-btn .key { color: #4b5a73; }
    .choice-btn:disabled { cursor: default; }

    .explanation { margin-top: 16px; background: #1e2d44; border-left: 3px solid #3b82f6; border-radius: 8px; padding: 14px 16px; font-size: 14px; line-height: 1.6; color: #94a8c8; display: none; }
    .explanation.pref-confirm { border-color: #f59e0b; color: #d4a04a; }
    .next-btn { margin-top: 16px; width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: none; transition: opacity 0.15s; }
    .next-btn.knowledge { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; }
    .next-btn.preference { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; }
    .next-btn.deep { background: linear-gradient(135deg, #10b981, #3b82f6); color: #fff; }
    .next-btn:hover { opacity: 0.88; }

    /* 시작 */
    .start-screen { text-align: center; padding: 20px 0; }
    .start-screen h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .start-screen p { color: #6b7fa3; font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
    .phase-desc { display: flex; gap: 12px; margin-bottom: 28px; }
    .phase-box { flex: 1; background: #243044; border-radius: 12px; padding: 16px; text-align: left; }
    .ph-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .ph-body { font-size: 13px; color: #7a90b4; line-height: 1.5; }
    .start-btn { padding: 14px 40px; border: none; border-radius: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }

    /* 로딩 */
    .loader { text-align: center; padding: 40px 0; color: #6b7fa3; font-size: 15px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #243044; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 */
    .result { text-align: center; padding: 10px 0; }
    .result-title { font-size: 18px; font-weight: 700; color: #d1d9ef; margin-bottom: 6px; }
    .result-sub { font-size: 14px; color: #6b7fa3; margin-bottom: 24px; }

    /* 오각형 차트 */
    .pentagon-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    svg.pentagon { overflow: visible; }
    .pentagon-label { font-size: 12px; fill: #94a8c8; font-family: -apple-system, sans-serif; }
    .pentagon-score { font-size: 11px; fill: #60a5fa; font-weight: 700; font-family: -apple-system, sans-serif; }

    .tendency-card { background: #243044; border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; text-align: left; }
    .tendency-card .tc-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: #4b6a9b; text-transform: uppercase; margin-bottom: 8px; }
    .tendency-card .tc-name { font-size: 20px; font-weight: 700; color: #fbbf24; margin-bottom: 8px; }
    .tendency-card .tc-desc { font-size: 14px; color: #7a90b4; line-height: 1.65; margin-bottom: 10px; }
    .news-hint { background: #1a2535; border-left: 3px solid #f59e0b; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #d4a04a; line-height: 1.6; }

    /* 심층/기본 선택 */
    .choice-section { margin-bottom: 16px; }
    .choice-section .choice-title { font-size: 14px; color: #6b7fa3; text-align: center; margin-bottom: 12px; }
    .choice-row { display: flex; gap: 12px; }
    .depth-btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; border: none; }
    .depth-btn.basic { background: #243044; color: #c8d0e8; }
    .depth-btn.basic:hover { background: #2d3f5c; }
    .depth-btn.deep { background: linear-gradient(135deg, #10b981, #3b82f6); color: #fff; }
    .depth-btn.deep:hover { opacity: 0.88; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="card">

  <!-- 시작 -->
  <div id="screen-start" class="start-screen">
    <h1>💹 투자 스탯 진단</h1>
    <p>10문제로 투자 스탯과 투자 성향을 분석합니다.</p>
    <div class="phase-desc">
      <div class="phase-box">
        <div class="ph-title" style="color:#3b82f6">10문제 · 5개 영역</div>
        <div class="ph-body">기본개념·마켓수급·매크로<br>펀더멘털·리스크관리</div>
      </div>
      <div class="phase-box">
        <div class="ph-title" style="color:#10b981">오각형 스탯 + 성향</div>
        <div class="ph-body">영역별 점수 시각화<br>→ 맞춤 분석 제공</div>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">진단 시작</button>
  </div>

  <!-- 로딩 -->
  <div id="screen-loading" class="loader hidden">
    <div class="spinner"></div>
    <span id="loading-text">문제를 생성하는 중...</span>
    <div id="loading-error" style="display:none;margin-top:20px;">
      <p style="color:#ef4444;margin-bottom:12px;">문제 생성에 실패했습니다.</p>
      <button onclick="retryQuestion()" style="padding:10px 24px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:14px;cursor:pointer;">다시 시도</button>
    </div>
  </div>

  <!-- 퀴즈 -->
  <div id="screen-quiz" class="hidden">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill knowledge" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
    <div class="phase-label knowledge" id="phase-label"></div>
    <div class="area-badge knowledge" id="area-badge"></div>
    <div class="question-text" id="question-text"></div>
    <div class="choices" id="choices"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn knowledge" id="next-btn">다음 문제 →</button>
  </div>

  <!-- 결과 -->
  <div id="screen-result" class="result hidden">

    <!-- 타이틀 -->
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:13px;color:#6b7fa3;margin-bottom:4px;">나의 투자 스탯을 분석했어요</div>
      <div id="tendency-headline" style="font-size:20px;font-weight:700;color:#e8eaf0;"></div>
    </div>

    <!-- 오각형 차트 -->
    <div class="pentagon-wrap">
      <svg class="pentagon" id="pentagon-svg" width="280" height="280" viewBox="-140 -140 280 280"></svg>
    </div>

    <!-- 강한/보완 영역 -->
    <div id="area-summary" style="display:flex;gap:10px;margin-bottom:16px;"></div>

    <!-- 영역별 설명 -->
    <div style="background:#243044;border-radius:14px;padding:16px 20px;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:.08em;color:#4b6a9b;text-transform:uppercase;margin-bottom:12px;">영역별 분석</div>
      <div id="area-descs"></div>
    </div>

    <!-- 맞춤 분석 안내 -->
    <div style="background:#1e2d44;border-left:3px solid #3b82f6;border-radius:10px;padding:16px 18px;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:.08em;color:#3b82f6;text-transform:uppercase;margin-bottom:10px;">이런 분석을 제공해드려요</div>
      <div id="analysis-hints"></div>
    </div>

    <!-- 심층/완료 선택 -->
    <div class="choice-section" id="depth-choice">
      <div class="choice-title">더 정밀한 분석을 원하시나요?</div>
      <div class="choice-row">
        <button class="depth-btn basic" onclick="proceedBasic()">이대로 시작하기</button>
        <button class="depth-btn deep" onclick="startDeep()">심층 분석 (+5문제)</button>
      </div>
    </div>

    <div id="result-done" class="hidden" style="text-align:center;">
      <button style="padding:12px 32px;border:none;border-radius:12px;background:#243044;color:#c8d0e8;font-size:15px;cursor:pointer;" onclick="restartQuiz()">다시 진단하기</button>
    </div>
  </div>

</div>

<script>
const BASE = '';
const AREAS = ['기본개념', '마켓수급', '매크로', '펀더멘털', '리스크관리'];
const AREA_COLORS = { '기본개념': '#3b82f6', '마켓수급': '#8b5cf6', '매크로': '#f59e0b', '펀더멘털': '#10b981', '리스크관리': '#ef4444' };
const AREA_DESCS = {
  '기본개념': '주식·채권·ETF의 의미, 주주 개념, 시장 구조 등 투자의 첫 걸음이 되는 기초 지식',
  '마켓수급': '거래량·수급 흐름, RSI·MACD 등 기술적 신호, 어닝 서프라이즈와 선반영 원리',
  '매크로':   '기준금리·환율·GDP·인플레이션 등 거시경제 변수가 주가에 미치는 영향',
  '펀더멘털': 'PER·PBR·ROE·EPS 등 재무지표로 기업 내재가치를 분석하는 능력',
  '리스크관리': '베타계수·변동성·포트폴리오 분산·손절·헤징 등 손실 방어 전략',
};

let sessionId = null, currentQuestion = null, totalQ = 10, knowledgeQ = 7;
let isDeepMode = false;

function api(path, opts = {}) {
  return fetch(BASE + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  }).then(r => r.json());
}

function show(id) {
  ['screen-start','screen-loading','screen-quiz','screen-result'].forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

async function startQuiz() {
  show('screen-loading');
  const s = await api('/quiz/sessions', { method: 'POST', body: JSON.stringify({ user_id: null }) });
  sessionId = s.session_id;
  totalQ = s.total_questions;
  knowledgeQ = s.knowledge_questions;
  await loadNextQuestion();
}

async function loadNextQuestion() {
  show('screen-loading');
  document.getElementById('loading-text').textContent = '문제를 생성하는 중...';
  document.getElementById('loading-error').style.display = 'none';
  try {
    const q = await api(`/quiz/sessions/${sessionId}/next-question`, { method: 'POST' });
    if (q.detail || q.error) throw new Error(q.detail || q.error);
    currentQuestion = q;
    renderQuestion(q);
    show('screen-quiz');
  } catch (e) {
    document.getElementById('loading-text').textContent = '';
    document.getElementById('loading-error').style.display = 'block';
  }
}

function retryQuestion() {
  loadNextQuestion();
}

function renderQuestion(q) {
  const isPref = q.question_type === 'preference';
  const isDeep = isDeepMode;
  const fill = document.getElementById('progress-fill');
  const phaseLbl = document.getElementById('phase-label');
  const badge = document.getElementById('area-badge');

  let phaseClass = isDeepMode ? 'deep' : 'knowledge';
  fill.className = 'progress-bar-fill ' + (isDeepMode ? 'deep-bar' : 'knowledge-bar');
  phaseLbl.className = 'phase-label ' + phaseClass;
  badge.className = 'area-badge ' + phaseClass;
  phaseLbl.textContent = isDeepMode ? 'PHASE 2 · 심층 분석' : 'PHASE 1 · 투자 스탯';
  badge.textContent = q.area || '지식';

  const pct = ((q.question_number - 1) / totalQ) * 100;
  fill.style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${q.question_number} / ${totalQ}`;
  document.getElementById('question-text').textContent = q.question_text;
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('explanation').className = 'explanation';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
  nextBtn.className = 'next-btn ' + phaseClass;

  const el = document.getElementById('choices');
  el.innerHTML = '';
  Object.entries(q.choices).forEach(([key, text]) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (key === 'E' && !isPref ? ' e-btn' : '');
    btn.innerHTML = `<span class="key">${key}</span><span>${text}</span>`;
    btn.onclick = () => submitAnswer(key);
    el.appendChild(btn);
  });
}

async function submitAnswer(answer) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const r = await api(`/quiz/sessions/${sessionId}/answers`, {
    method: 'POST', body: JSON.stringify({ question_id: currentQuestion.question_id, answer })
  });

  const btns = document.querySelectorAll('.choice-btn');
  const keys = Object.keys(currentQuestion.choices);
  const expEl = document.getElementById('explanation');

  btns.forEach((btn, i) => {
    const k = keys[i];
    if (k === r.correct_answer) btn.classList.add('correct');
    else if (k === answer && !r.is_correct) btn.classList.add('wrong');
  });
  expEl.textContent = r.is_모름 ? `정답은 ${r.correct_answer}번입니다. ${r.explanation}` : r.explanation;
  expEl.style.display = 'block';

  const pct = (r.questions_asked / totalQ) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${r.questions_asked} / ${totalQ}`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  if (r.session_status === 'completed') {
    nextBtn.textContent = '결과 보기 →';
    nextBtn.onclick = () => showResult(r);
  } else {
    nextBtn.textContent = r.is_preference ? '다음 질문 →' : '다음 문제 →';
    nextBtn.onclick = loadNextQuestion;
  }
}

function showResult(r) {
  const emoji = r.tendency_emoji || '📊';
  const label = r.tendency || '탐색형 투자자';
  document.getElementById('tendency-headline').textContent = `${emoji} ${label}`;
  drawPentagon(r.area_stats);
  drawAreaSummary(r.area_stats);
  drawAreaDescs(r.area_stats);
  // 맞춤 분석 힌트
  const hintsEl = document.getElementById('analysis-hints');
  const hints = r.analysis_hints || [];
  hintsEl.innerHTML = hints.map(h => `<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">
    <span style="color:#60a5fa;font-size:12px;margin-top:2px;">•</span>
    <span style="font-size:13px;color:#94a8c8;line-height:1.5">${h}</span>
  </div>`).join('');
  document.getElementById('depth-choice').classList.remove('hidden');
  document.getElementById('result-done').classList.add('hidden');
  show('screen-result');
}

function drawPentagon(areaStats) {
  const svg = document.getElementById('pentagon-svg');
  svg.innerHTML = '';
  const R = 90, cx = 0, cy = 0;
  const n = AREAS.length;

  function point(idx, r) {
    const angle = (idx * 2 * Math.PI / n) - Math.PI / 2;
    return { x: r * Math.cos(angle), y: r * Math.sin(angle) };
  }

  // 배경 그리드 (5단계)
  for (let g = 1; g <= 5; g++) {
    const r = (g / 5) * R;
    const pts = AREAS.map((_, i) => point(i, r));
    const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') + 'Z';
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#2d3f5c');
    path.setAttribute('stroke-width', '1');
    svg.appendChild(path);
  }

  // 축선
  AREAS.forEach((_, i) => {
    const p = point(i, R);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', '0'); line.setAttribute('y1', '0');
    line.setAttribute('x2', p.x.toFixed(1)); line.setAttribute('y2', p.y.toFixed(1));
    line.setAttribute('stroke', '#2d3f5c'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  });

  // 스탯 채움
  const scores = AREAS.map(a => {
    if (!areaStats || !areaStats[a]) return 0;
    return areaStats[a].score ?? 0;
  });
  const statPts = AREAS.map((_, i) => point(i, (scores[i] / 5) * R));
  const statD = statPts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') + 'Z';
  const statPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  statPath.setAttribute('d', statD);
  statPath.setAttribute('fill', 'rgba(59,130,246,0.25)');
  statPath.setAttribute('stroke', '#3b82f6');
  statPath.setAttribute('stroke-width', '2');
  svg.appendChild(statPath);

  // 점
  AREAS.forEach((_, i) => {
    const p = statPts[i];
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x.toFixed(1)); circle.setAttribute('cy', p.y.toFixed(1));
    circle.setAttribute('r', '4'); circle.setAttribute('fill', '#3b82f6');
    svg.appendChild(circle);
  });

  // 라벨
  AREAS.forEach((area, i) => {
    const p = point(i, R + 24);
    const score = areaStats && areaStats[area] ? (areaStats[area].score ?? '?') : '?';

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', p.x.toFixed(1)); text.setAttribute('y', p.y.toFixed(1));
    text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('class', 'pentagon-label');
    text.textContent = area;
    svg.appendChild(text);

    const scoreText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    scoreText.setAttribute('x', p.x.toFixed(1)); scoreText.setAttribute('y', (parseFloat(p.y) + 14).toFixed(1));
    scoreText.setAttribute('text-anchor', 'middle'); scoreText.setAttribute('dominant-baseline', 'middle');
    scoreText.setAttribute('class', 'pentagon-score');
    scoreText.textContent = score !== '?' ? `${score}/5` : '-';
    svg.appendChild(scoreText);
  });
}

function drawAreaSummary(areaStats) {
  if (!areaStats) return;
  const strong = AREAS.filter(a => areaStats[a]?.score != null && areaStats[a].score >= 3.5);
  const weak   = AREAS.filter(a => areaStats[a]?.score != null && areaStats[a].score < 2.5);
  const el = document.getElementById('area-summary');
  el.innerHTML = '';
  if (strong.length) {
    el.innerHTML += `<div style="flex:1;background:#0d2418;border-radius:10px;padding:12px 14px;">
      <div style="font-size:11px;color:#34d399;font-weight:600;margin-bottom:6px;">💪 강한 영역</div>
      <div style="font-size:13px;color:#86efac;">${strong.join(' · ')}</div>
    </div>`;
  }
  if (weak.length) {
    el.innerHTML += `<div style="flex:1;background:#2d1212;border-radius:10px;padding:12px 14px;">
      <div style="font-size:11px;color:#f87171;font-weight:600;margin-bottom:6px;">📈 보완하면 좋은 영역</div>
      <div style="font-size:13px;color:#fca5a5;">${weak.join(' · ')}</div>
    </div>`;
  }
}

function drawAreaDescs(areaStats) {
  const el = document.getElementById('area-descs');
  el.innerHTML = AREAS.map(a => {
    const s = areaStats?.[a];
    const score = s?.score != null ? s.score : null;
    const bar = score != null ? Math.round((score / 5) * 100) : 0;
    const color = AREA_COLORS[a];
    return `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:600;color:${color}">${a}</span>
        <span style="font-size:12px;color:#6b7fa3">${score != null ? score + '/5' : '-'}</span>
      </div>
      <div style="background:#1a2535;border-radius:99px;height:4px;margin-bottom:5px;">
        <div style="background:${color};width:${bar}%;height:4px;border-radius:99px;transition:width .4s"></div>
      </div>
      <div style="font-size:12px;color:#6b7fa3;line-height:1.5">${AREA_DESCS[a]}</div>
    </div>`;
  }).join('');
}

async function startDeep() {
  document.getElementById('depth-choice').classList.add('hidden');
  await api(`/quiz/sessions/${sessionId}/deep`, { method: 'POST' });
  isDeepMode = true;
  totalQ = 10 + 5;
  await loadNextQuestion();
}

function proceedBasic() {
  document.getElementById('depth-choice').classList.add('hidden');
  document.getElementById('result-done').classList.remove('hidden');
}

function restartQuiz() {
  sessionId = null; currentQuestion = null; isDeepMode = false; totalQ = 10;
  show('screen-start');
}
</script>
