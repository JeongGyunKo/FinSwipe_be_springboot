name: EC2 무중단 배포

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, finswipe-ec2]
    env:
      GENAI_BASIC_AUTH: ${{ secrets.GENAI_BASIC_AUTH }}

    steps:
      - name: 환경변수 파일 업데이트
        shell: bash
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          FINLIGHT_API_KEY: ${{ secrets.FINLIGHT_API_KEY }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          GENAI_POSTGRES_DSN: ${{ secrets.GENAI_POSTGRES_DSN }}
          SWAGGER_PASSWORD: ${{ secrets.SWAGGER_PASSWORD }}
        run: |
          # Spring Boot .env 업데이트
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${DB_PASSWORD}|" ~/finswipe/.env
          sed -i "s|^FINLIGHT_API_KEY=.*|FINLIGHT_API_KEY=${FINLIGHT_API_KEY}|" ~/finswipe/.env
          sed -i "s|^ADMIN_API_KEY=.*|ADMIN_API_KEY=${ADMIN_API_KEY}|" ~/finswipe/.env
          # CORS 허용 도메인 업데이트
          if grep -q "^CORS_ORIGINS=" ~/finswipe/.env; then
            sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=https://www.finswipe.co.kr,https://api.finswipe.co.kr,http://localhost:5173|" ~/finswipe/.env
          else
            echo "CORS_ORIGINS=https://www.finswipe.co.kr,https://api.finswipe.co.kr,http://localhost:5173" >> ~/finswipe/.env
          fi
          # 스웨거 문서 Basic 인증 (FE 문서 열람용) — 비번은 Secret으로만 주입, 특수문자 안전하게 교체
          upsert_env() {
            local key="$1"; shift; local val="$*"
            grep -v "^${key}=" ~/finswipe/.env > ~/finswipe/.env.tmp 2>/dev/null || true
            mv ~/finswipe/.env.tmp ~/finswipe/.env
            echo "${key}=${val}" >> ~/finswipe/.env
          }
          upsert_env ENABLE_SWAGGER true
          upsert_env SWAGGER_USER finswipe
          upsert_env SWAGGER_PASSWORD "${SWAGGER_PASSWORD}"
          # GenAI .env 업데이트
          sed -i "s|^GENAI_POSTGRES_DSN=.*|GENAI_POSTGRES_DSN=${GENAI_POSTGRES_DSN}|" ~/finswipe/genai/.env

      - name: EC2 배포 (빌드 → 헬스체크 → 교체)
        shell: bash
        run: |
          set -e
          cd ~/finswipe
          git fetch origin && git reset --hard origin/master

          # ── Spring Boot 빌드 ────────────────────────────────────────
          cd be
          ./gradlew bootJar --no-daemon -x test
          NEW_JAR=~/finswipe/be/build/libs/app.jar

          cp $NEW_JAR ~/finswipe/app.jar.new
          mv ~/finswipe/app.jar.new ~/finswipe/app.jar

          sudo systemctl restart finswipe

          # 헬스체크 — 최대 60초 대기
          echo "Spring Boot 헬스체크 중..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s http://127.0.0.1:8080/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "Spring Boot 정상 기동 (${i}회차)"
              break
            fi
            echo "대기 중... (${i}/12)"
            sleep 5
          done

          if [ "$STATUS" != "ok" ]; then
            echo "Spring Boot 기동 실패 — 배포 중단"
            exit 1
          fi

          # ── GenAI 패키지 업데이트 및 재시작 ────────────────────────
          cd ~/finswipe/genai
          source venv/bin/activate
          pip install torch --index-url https://download.pytorch.org/whl/cpu --no-cache-dir -q
          pip install -e . --no-cache-dir --quiet
          sudo systemctl restart finswipe-genai

          # GenAI 헬스체크 — 최대 30초 대기
          echo "GenAI 헬스체크 중..."
          for i in $(seq 1 6); do
            GEN_STATUS=$(curl -s -u "$GENAI_BASIC_AUTH" http://127.0.0.1:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$GEN_STATUS" = "ok" ]; then
              echo "GenAI 정상 기동 (${i}회차)"
              break
            fi
            sleep 5
          done

          # ── Digest Worker 서비스 등록 및 재시작 ─────────────────────
          sudo cp ~/finswipe/genai/scripts/finswipe-genai-digest-worker.service \
                  /etc/systemd/system/finswipe-genai-digest-worker.service
          sudo systemctl daemon-reload
          sudo systemctl enable finswipe-genai-digest-worker
          sudo systemctl restart finswipe-genai-digest-worker
          echo "Digest Worker 재시작 완료"

          # ── Nginx reload (서버 설정은 Certbot이 관리, 복사 불필요) ──
          sudo nginx -t && sudo systemctl reload nginx
          echo "Nginx reload 완료"

          echo "===== 배포 완료: $(date) ====="
          curl -s http://127.0.0.1:8080/health
