server {
    listen 80;
    server_name finswipe.co.kr www.finswipe.co.kr;

    # Let's Encrypt 인증용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.finswipe.co.kr$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name finswipe.co.kr;

    ssl_certificate     /etc/letsencrypt/live/finswipe.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finswipe.co.kr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.finswipe.co.kr$request_uri;
}

server {
    listen 443 ssl;
    server_name www.finswipe.co.kr;

    ssl_certificate     /etc/letsencrypt/live/finswipe.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finswipe.co.kr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더 (Spring Boot SecurityHeadersFilter와 중복 방지)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Spring Boot BE
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        client_max_body_size 10m;
    }
}
